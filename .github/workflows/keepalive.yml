name: Supabase keep-alive

# A free Supabase project pauses after 7 days with no activity. This pings the
# REST API daily (using the public publishable key) so the project stays active.
on:
  schedule:
    - cron: '23 5 * * *' # daily ~05:23 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://gfbchmihslthtuesfurb.supabase.co/rest/v1/business_units?select=code&limit=1" \
            -H "apikey: sb_publishable_FRgfFkoiaLsw2gv7tOfU4w_bBcyhQSQ")
          echo "Supabase responded: $code"
          # Any HTTP response counts as activity; only fail on a network error.
          test -n "$code"
